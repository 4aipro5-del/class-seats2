              overflow: hidden;                                                 
                                                                                
          }

          // --- 이미지 저장 (글자 위치 보정 포함) ---                          
                                                                                
          function saveAsImage() {                                              
                                                                                
              const loading = document.getElementById('loading');               
                                                                                
              document.getElementById('status-text').innerText = "이미지를      
  생성하고 있습니다...";                                                        
                                                                                
              loading.classList.remove('hidden');                               
                                                                                
                                                                                
                                                                                
              const currentZoom = captureArea.style.transform;                  
                                                                                
              captureArea.style.transform = 'scale(1)';                         
                                                                                
                                                                                
                                                                                
              setTimeout(() => {                                                
                                                                                
                  html2canvas(captureArea, {                                    
                                                                                
                      width: 1920, height: 1080,                                
                                                                                
                      backgroundColor: '#fdfaf3',                               
                                                                                
                      scale: 2,                                                 
                                                                                
                      useCORS: true,                                            
                                                                                
                      logging: false,                                           
                                                                                
                      onclone: (clonedDoc) => {                                 
                                                                                
                          const area =                                          
  clonedDoc.getElementById('capture-area');                                     
                                                                                
                          area.style.transform = 'none';                        
                                                                                
                                                                                
                                                                                
                          // 캡처용 클론에서 글자 높이 강제 보정 (html2canvas   
  특유의 하단 쏠림 상쇄)                                                        
                                                                                
                          const nameTags =                                      
  clonedDoc.querySelectorAll('.name-tag');                                      
                                                                                
                          nameTags.forEach(tag => {                             
                                                                                
                              tag.style.paddingBottom = "35px";                 
                                                                                
                              tag.style.display = "flex";                       
                                                                                
                              tag.style.alignItems = "center";                  
                                                                                
                              tag.style.justifyContent = "center";              
                                                                                
                          });                                                   
                                                                                
                      }                                                         
                                                                                
                  }).then(canvas => {                                           
                                                                                
                      const link = document.createElement('a');                 
                                                                                
                      link.download = `자리배치_${new Date().getTime()}.png`;   
                                                                                
                      link.href = canvas.toDataURL('image/png', 1.0);           
                                                                                
                      link.click();                                             
                                                                                
                                                                                
                                                                                
                      captureArea.style.transform = currentZoom;                
                                                                                
                      loading.classList.add('hidden');                          
                                                                                
                  });                                                           
                                                                                
              }, 500);                                                          
                                                                                
          }                                                                     
                                                                                
                                                                                
                                                                                
          function printToPDF() {                                               
                                                                                
              const currentZoom = captureArea.style.transform;                  
                                                                                
              captureArea.style.transform = 'scale(1)';                         
                                                                                
              setTimeout(() => {                                                
                                                                                
                  window.print();                                               
                                                                                
                  captureArea.style.transform = currentZoom;                    
                                                                                
              }, 300);                                                          
                                                                                
          }                                                                     
                                                                                
      </script>                                                                 
                                                                                
  </body>                                                                       
                                                                                
  </html>
