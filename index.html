<!DOCTYPE html>

<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>우리 반 자리 바꾸기</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 이미지 저장을 위한 라이브러리 -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- 귀여운 개구 폰트 적용 -->

    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">

    <style>

        body {

            font-family: 'Gaegu', cursive;

            background: linear-gradient(135deg, #fdfaf3 0%, #f0f4f0 100%);

            min-height: 100vh;

            overflow-x: hidden;

            -webkit-font-smoothing: antialiased;

        }

        .glass-morphism {

            background: rgba(255, 255, 255, 0.95);

            backdrop-filter: blur(10px);

            border-radius: 24px;

            border: 1px solid rgba(255, 255, 255, 0.5);

            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.08);

        }

        .desk {

            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);

            text-rendering: optimizeLegibility;

        }



        /* 1920x1080 고해상도 작업 영역 설정 */

        #canvas-container {

            width: 100%;

            overflow: auto;

            display: flex;

            justify-content: center;

            padding: 20px;

            background-color: #cbd5e1;

        }

        #capture-area {

            width: 1920px;

            height: 1080px;

            min-width: 1920px;

            min-height: 1080px;

            position: relative;

            background-color: #fdfaf3;

            flex-shrink: 0;

            transform-origin: top center;

            overflow: hidden;

        }



        /* 복도 및 문 영역 (우측 220px 고정 분리) */

        .door-zone {

            position: absolute;

            right: 0;

            top: 0;

            width: 220px;

            height: 100%;

            border-left: 6px dashed #e2e8f0;

            background-color: rgba(241, 245, 249, 0.7);

            z-index: 50;

        }

        .classroom-door {

            position: absolute;

            left: 50%;

            transform: translateX(-50%);

            width: 80px;

            height: 220px;

            background-color: #e3d5ca;

            border: 6px solid #d5bdaf;

            border-radius: 16px;

            display: flex;

            align-items: center;

            justify-content: center;

            writing-mode: vertical-rl;

            color: #8d7b68;

            font-weight: bold;

            font-size: 36px;

            box-shadow: 4px 4px 15px rgba(0,0,0,0.1);

        }

        .door-front { top: 160px; }

        .door-back { bottom: 100px; }



        /* 인쇄 시 설정 (PDF 저장용) */

        @media print {

            @page {

                size: 1920px 1080px landscape;

                margin: 0;

            }

            body { 

                background: white !important; 

                margin: 0;

                padding: 0;

            }

            .no-print { display: none !important; }

            #canvas-container { 

                padding: 0 !important; 

                overflow: visible !important; 

                background: none !important;

                height: 1080px !important;

            }

            #capture-area { 

                transform: scale(1) !important; 

                border: none !important; 

                box-shadow: none !important;

                position: absolute !important;

                top: 0 !important;

                left: 0 !important;

            }

        }

    </style>

</head>

<body class="p-3 md:p-6 text-gray-800">

    <div id="star-bg" class="fixed inset-0 pointer-events-none -z-10"></div>



    <div class="max-w-[1880px] mx-auto">

        <header class="text-center mb-6 no-print">

            <h1 class="text-5xl md:text-7xl font-bold text-orange-400">자리 바꾸기</h1>

        </header>



        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">

            <!-- 좌측 설정 패널 -->

            <div class="lg:col-span-1 space-y-4 no-print">

                <!-- 1. 학생 명단 -->

                <div class="glass-morphism p-6 border-orange-100 border-2">

                    <h2 class="text-2xl font-bold text-orange-500 mb-3 flex items-center">

                        <span class="mr-2">📝</span> 1. 명단 입력

                    </h2>

                    <textarea id="student-input" rows="6" class="w-full p-4 rounded-2xl border-2 border-orange-50 focus:border-orange-200 focus:outline-none transition text-lg" placeholder="이름,성별(남/여) 형식으로 입력하세요.&#10;예: 김철수,남&#10;이영희,여"></textarea>

                    <button onclick="parseStudents()" class="w-full mt-2 bg-orange-400 hover:bg-orange-500 text-white py-3 rounded-xl transition font-bold shadow-md text-lg">명단 업데이트</button>

                </div>



                <!-- 2. 대형 설정 -->

                <div class="glass-morphism p-6 border-green-100 border-2">

                    <h2 class="text-2xl font-bold text-green-600 mb-3 flex items-center">

                        <span class="mr-2">📐</span> 2. 대형 설정

                    </h2>

                    <div class="grid grid-cols-2 gap-3 mb-4">

                        <div>

                            <label class="text-xs text-gray-400 ml-1">가로(칸)</label>

                            <input type="number" id="grid-cols" value="6" class="w-full p-2.5 rounded-xl border-2 border-green-50 text-center font-bold">

                        </div>

                        <div>

                            <label class="text-xs text-gray-400 ml-1">세로(줄)</label>

                            <input type="number" id="grid-rows" value="5" class="w-full p-2.5 rounded-xl border-2 border-green-50 text-center font-bold">

                        </div>

                    </div>

                    <button onclick="generateGrid()" class="w-full bg-green-500 hover:bg-green-600 text-white py-4 rounded-xl transition font-bold shadow-md text-lg">그리드 좌석 생성</button>

                </div>



                <!-- 3. 실행 및 저장 -->

                <div class="glass-morphism p-6 border-amber-100 border-2">

                    <h2 class="text-2xl font-bold text-amber-600 mb-3 flex items-center">

                        <span class="mr-2">🚀</span> 3. 자리 섞기

                    </h2>

                    <div class="space-y-3">

                        <label class="flex items-center space-x-2.5 cursor-pointer p-1.5 rounded-lg hover:bg-amber-50 transition">

                            <input type="checkbox" id="respect-gender" class="w-6 h-6 rounded-full text-amber-500">

                            <span class="text-gray-700 font-bold text-lg">성별 지정석 규칙 적용</span>

                        </label>

                        <button onclick="shuffleSeats()" class="w-full bg-amber-400 hover:bg-amber-500 text-white py-5 rounded-2xl transition font-bold text-3xl shadow-lg">자리 섞기!</button>

                        <div class="grid grid-cols-2 gap-2">

                            <button onclick="saveAsImage()" class="bg-white border-2 border-gray-100 hover:bg-gray-50 text-gray-600 py-3 rounded-lg font-bold transition">이미지 저장</button>

                            <button onclick="printToPDF()" class="bg-white border-2 border-gray-100 hover:bg-gray-50 text-gray-600 py-3 rounded-lg font-bold transition">PDF 출력</button>

                        </div>

                    </div>

                </div>

            </div>



            <!-- 작업 공간 (1920x1080 캔버스) -->

            <div class="lg:col-span-3">

                <div class="mb-2 flex justify-between items-center no-print px-2">

                    <span class="text-gray-500 font-bold text-lg italic">1920x1080 FHD 작업 영역</span>

                    <div class="flex items-center gap-3">

                        <label class="text-sm text-gray-500 font-bold">화면 배율:</label>

                        <input type="range" id="zoom-slider" min="0.1" max="1" step="0.01" value="0.5" class="w-48" oninput="adjustZoom(this.value)">

                    </div>

                </div>

                <div id="canvas-container" class="glass-morphism shadow-inner">

                    <div id="capture-area" class="border-white border-[10px] shadow-2xl flex flex-col">

                        <!-- 문 구역 -->

                        <div class="door-zone">

                            <div class="classroom-door door-front">앞문</div>

                            <div class="classroom-door door-back">뒷문</div>

                        </div>



                        <!-- 칠판 -->

                        <div class="text-center mt-10 mb-8">

                            <div class="inline-block px-48 py-8 bg-white border-4 border-dashed border-gray-200 rounded-full text-gray-300 font-bold text-7xl">

                                칠 판 (FRONT)

                            </div>

                        </div>

                        

                        <!-- 좌석 배치 영역 (너비 1700px로 문과 분리) -->

                        <div id="seating-area" class="flex-grow relative px-16 pb-12 overflow-hidden" style="width: 1700px;"></div>

                    </div>

                </div>

            </div>

        </div>

    </div>



    <!-- 로딩 메시지 -->

    <div id="loading" class="fixed inset-0 bg-white/95 flex items-center justify-center z-[9999] hidden">

        <div class="text-center">

            <div class="inline-block animate-bounce text-9xl mb-8">✨</div>

            <p class="text-5xl font-bold text-orange-500" id="status-text">처리 중...</p>

        </div>

    </div>



    <script>

        let students = []; 

        let gridState = []; 

        

        const STORAGE_KEY = 'SEATING_APP_FINAL_STABLE';

        const seatingArea = document.getElementById('seating-area');

        const captureArea = document.getElementById('capture-area');

        const studentInput = document.getElementById('student-input');



        window.onload = () => {

            loadData();

            createStars();

            autoAdjustZoom();

            renderGrid();

            window.addEventListener('resize', autoAdjustZoom);

        };



        function autoAdjustZoom() {

            const container = document.getElementById('canvas-container');

            const availableWidth = container.offsetWidth - 40;

            const ratio = availableWidth / 1920;

            const zoomValue = Math.min(Math.max(ratio, 0.1), 1);

            adjustZoom(zoomValue);

            document.getElementById('zoom-slider').value = zoomValue;

        }



        function adjustZoom(val) {

            captureArea.style.transform = `scale(${val})`;

            const container = document.getElementById('canvas-container');

            container.style.height = (1080 * val + 40) + 'px';

        }



        function createStars() {

            const container = document.getElementById('star-bg');

            for (let i = 0; i < 60; i++) {

                const star = document.createElement('div');

                star.innerHTML = '✦'; star.style.position = 'absolute';

                star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';

                star.style.color = '#ffd8a8'; star.style.opacity = 0.3;

                star.style.fontSize = (Math.random() * 20 + 10) + 'px';

                container.appendChild(star);

            }

        }



        function saveData() {

            const data = {

                students, gridState,

                rows: document.getElementById('grid-rows').value,

                cols: document.getElementById('grid-cols').value,

                inputText: studentInput.value

            };

            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

        }



        function loadData() {

            const saved = localStorage.getItem(STORAGE_KEY);

            if (saved) {

                const data = JSON.parse(saved);

                students = data.students || [];

                gridState = data.gridState || [];

                document.getElementById('grid-rows').value = data.rows || 5;

                document.getElementById('grid-cols').value = data.cols || 6;

                studentInput.value = data.inputText || "";

            }

        }



        function parseStudents() {

            const text = studentInput.value.trim();

            if (!text) return;

            const lines = text.split('\n');

            students = lines.map(line => {

                const [name, gender] = line.split(',').map(p => p.trim());

                return { name, gender: gender === '여' ? '여' : '남', isFixed: false };

            }).filter(s => s.name);

            saveData();

            renderGrid();

        }



        function generateGrid() {

            const r = parseInt(document.getElementById('grid-rows').value);

            const c = parseInt(document.getElementById('grid-cols').value);

            gridState = Array.from({ length: r * c }, (_, i) => ({ id: i, type: 'normal', studentName: null }));

            renderGrid();

            saveData();

        }



        function renderGrid() {

            seatingArea.innerHTML = '';

            seatingArea.className = "grid gap-x-6 gap-y-4 w-full h-full content-start px-16";

            const cols = document.getElementById('grid-cols').value || 6;

            seatingArea.style.gridTemplateColumns = `repeat(${cols}, minmax(0, 1fr))`;

            

            gridState.forEach((seat, idx) => {

                const student = students.find(s => s.name === seat.studentName);

                const desk = createDeskEl(student, seat.type, seat.studentName, idx);

                

                desk.onclick = () => {

                    const types = ['normal', 'empty', 'male', 'female'];

                    seat.type = types[(types.indexOf(seat.type) + 1) % types.length];

                    if (seat.type === 'empty') seat.studentName = null;

                    renderGrid();

                    saveData();

                };



                const fixBtn = desk.querySelector('.fix-btn');

                if (fixBtn) {

                    fixBtn.onclick = (e) => {

                        e.stopPropagation();

                        if (student) student.isFixed = !student.isFixed;

                        renderGrid();

                        saveData();

                    };

                }

                seatingArea.appendChild(desk);

            });

        }



        function createDeskEl(student, type, assignedName, idx) {

            const desk = document.createElement('div');

            const sizeClass = 'h-44';

            

            if (type === 'empty') {

                desk.className = `desk group relative ${sizeClass} rounded-[44px] flex items-center justify-center border-4 border-dashed border-gray-200 bg-gray-50 opacity-40 transition-all cursor-pointer`;

                desk.innerHTML = `<span class="text-gray-400 text-3xl font-bold">비었음</span>`;

            } else {

                let colorBase = "bg-white border-gray-200 shadow-xl";

                let label = "";



                if (type === 'male') { colorBase = "bg-orange-50 border-orange-200 shadow-md"; label = "📙"; }

                if (type === 'female') { colorBase = "bg-green-50 border-green-200 shadow-md"; label = "📗"; }



                if (student) {

                    if (student.gender === '남') colorBase = "bg-orange-100 border-orange-400 text-orange-900";

                    else colorBase = "bg-green-100 border-green-400 text-green-900";

                    if (student.isFixed) colorBase += " ring-[12px] ring-amber-400 ring-offset-4";

                }



                desk.className = `desk group relative ${sizeClass} rounded-[44px] flex flex-col items-center justify-center border-4 p-2 text-center cursor-pointer shadow-lg ${colorBase}`;

                desk.innerHTML = `

                    <span class="absolute top-2 left-10 text-lg opacity-20 font-bold">${label}</span>

                    ${(student?.isFixed) ? `<span class="absolute top-2 right-10 text-2xl">📌</span>` : ''}

                    <div class="name-tag text-[90px] font-bold w-full flex items-center justify-center h-full">${assignedName || ''}</div>

                    <div class="absolute bottom-2 left-0 right-0 flex justify-center no-print opacity-0 group-hover:opacity-100">

                        <button class="fix-btn text-xs bg-white/90 px-5 py-1.5 rounded-full border border-black/10 font-bold shadow-sm">고정</button>

                    </div>

                `;

            }

            return desk;

        }



        async function shuffleSeats() {

            if (students.length === 0) return;

            const loading = document.getElementById('loading');

            document.getElementById('status-text').innerText = "이름표를 섞고 있어요!";

            loading.classList.remove('hidden');

            await new Promise(r => setTimeout(r, 1000));



            let pool = students.filter(s => !s.isFixed);

            for (let i = pool.length - 1; i > 0; i--) {

                const j = Math.floor(Math.random() * (i + 1));

                [pool[i], pool[j]] = [pool[j], pool[i]];

            }



            gridState.forEach(s => {

                const st = students.find(x => x.name === s.studentName);

                if (!st || !st.isFixed) s.studentName = null;

            });



            if (document.getElementById('respect-gender').checked) {

                gridState.forEach(s => {

                    if (!s.studentName) {

                        let idx = -1;

                        if (s.type === 'male') idx = pool.findIndex(p => p.gender === '남');

                        else if (s.type === 'female') idx = pool.findIndex(p => p.gender === '여');

                        if (idx !== -1) s.studentName = pool.splice(idx, 1)[0].name;

                    }

                });

            }



            gridState.forEach(s => {

                if (s.type !== 'empty' && !s.studentName && pool.length > 0) s.studentName = pool.shift().name;

            });



            renderGrid();

            saveData();

            loading.classList.add('hidden');

        }



        // --- 이미지 저장 (글자 위치 보정 포함) ---

        function saveAsImage() {

            const loading = document.getElementById('loading');

            document.getElementById('status-text').innerText = "이미지를 생성하고 있습니다...";

            loading.classList.remove('hidden');



            const currentZoom = captureArea.style.transform;

            captureArea.style.transform = 'scale(1)';

            

            setTimeout(() => {

                html2canvas(captureArea, { 

                    width: 1920, height: 1080,

                    backgroundColor: '#fdfaf3', 

                    scale: 2,

                    useCORS: true,

                    logging: false,

                    onclone: (clonedDoc) => {

                        const area = clonedDoc.getElementById('capture-area');

                        area.style.transform = 'none';

                        

                        // 캡처용 클론에서 글자 높이 강제 보정 (html2canvas 특유의 하단 쏠림 상쇄)

                        const nameTags = clonedDoc.querySelectorAll('.name-tag');

                        nameTags.forEach(tag => {

                            tag.style.paddingBottom = "35px"; 

                            tag.style.display = "flex";

                            tag.style.alignItems = "center";

                            tag.style.justifyContent = "center";

                        });

                    }

                }).then(canvas => {

                    const link = document.createElement('a');

                    link.download = `자리배치_${new Date().getTime()}.png`;

                    link.href = canvas.toDataURL('image/png', 1.0);

                    link.click();

                    

                    captureArea.style.transform = currentZoom;

                    loading.classList.add('hidden');

                });

            }, 500);

        }



        function printToPDF() {

            const currentZoom = captureArea.style.transform;

            captureArea.style.transform = 'scale(1)';

            setTimeout(() => {

                window.print();

                captureArea.style.transform = currentZoom;

            }, 300);

        }

    </script>

</body>

</html>
